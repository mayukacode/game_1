<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SWIPE HOOPS ｜ 昇降格プレーオフのHC</title>
<style>
  * { box-sizing: border-box; }
  body{
    margin:0;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
    background: radial-gradient(circle at 50% 15%, #ff9f2f, #b84f12 70%, #3a1606);
    color:white;
    display:flex; justify-content:center; align-items:center;
    height:100vh; overflow:hidden;
  }
  #game{ width:370px; max-width:93vw; }
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:12px; font-size:13px; color:#ffe2c2;
  }
  .league{ font-weight:bold; color:#fff; min-width:0; }
  .topRight{ display:flex; align-items:center; gap:8px; }
  .season{ color:#fff; white-space:nowrap; }
  .itemTopButton{
    border:1px solid rgba(255,213,79,.76);
    border-radius:999px;
    padding:6px 10px;
    min-width:64px;
    color:#ffd54f;
    background:linear-gradient(180deg, rgba(255,213,79,.16), rgba(0,0,0,.35));
    font-size:11px;
    font-weight:900;
    letter-spacing:.08em;
    box-shadow:0 0 12px rgba(255,213,79,.18), inset 0 1px 0 rgba(255,255,255,.16);
    cursor:pointer;
  }
  .itemTopButton:disabled{
    color:#8d998f;
    border-color:rgba(255,255,255,.18);
    background:rgba(0,0,0,.24);
    box-shadow:none;
    cursor:not-allowed;
  }
  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:18px; margin-bottom:10px; }
  .stat.full{ grid-column:1 / -1; }
  .stat{ background:rgba(0,0,0,.3); padding:8px 6px; border-radius:10px; text-align:center; font-size:11px; position:relative; overflow:visible; }
  .deltaPop{
    position:absolute; right:8px; top:25px; z-index:5;
    font-size:16px; font-weight:900; line-height:1; pointer-events:none;
    text-shadow:0 2px 4px rgba(0,0,0,.65); animation:deltaFloat .9s ease-out forwards;
  }
  .deltaPop.plus{ color:#62e88f; }
  .deltaPop.minus{ color:#ff7373; }
  .deltaPop.big{
    left:50%; right:auto; top:18px; z-index:7;
    font-size:26px; font-weight:1000; letter-spacing:.3px;
    transform:translateX(-50%) scale(.85);
    text-shadow:0 3px 8px rgba(0,0,0,.85), 0 0 16px rgba(255,255,255,.25);
    animation:bigDeltaFloat 1.05s ease-out forwards;
    white-space:nowrap;
  }
  @keyframes bigDeltaFloat{
    0%{ opacity:0; transform:translate(-50%, 8px) scale(.75); }
    15%{ opacity:1; transform:translate(-50%, 0) scale(1.18); }
    78%{ opacity:1; transform:translate(-50%, -8px) scale(1.03); }
    100%{ opacity:0; transform:translate(-50%, -30px) scale(1); }
  }
  .stat.choiceHintUp{
    background:linear-gradient(rgba(98,232,143,var(--hint-opacity,.22)), rgba(98,232,143,var(--hint-opacity,.22))), rgba(0,0,0,.3);
    box-shadow:0 0 14px rgba(98,232,143,calc(var(--hint-opacity,.22) * .8));
  }
  .stat.choiceHintDown{
    background:linear-gradient(rgba(255,115,115,var(--hint-opacity,.22)), rgba(255,115,115,var(--hint-opacity,.22))), rgba(0,0,0,.3);
    box-shadow:0 0 14px rgba(255,115,115,calc(var(--hint-opacity,.22) * .8));
  }
  @keyframes deltaFloat{
    0%{ opacity:0; transform:translateY(8px) scale(.9); }
    15%{ opacity:1; transform:translateY(0) scale(1.12); }
    100%{ opacity:0; transform:translateY(-24px) scale(1); }
  }
  .stat .icon{ font-size:18px; }
  .bar{ height:8px; background:#2c3a30; border-radius:4px; overflow:hidden; margin-top:6px; }
  .fill{ height:100%; width:50%; background:#4caf50; border-radius:4px; transition: width .35s ease, background .35s ease; }
  .danger, .dangerLow, .dangerHigh{ animation: blink .6s infinite alternate; }
  .dangerLow{ background:#e53935 !important; }
  .dangerHigh{ background:#e53935 !important; }
  #squadBar.dangerHigh{ background:#42a5f5 !important; box-shadow:0 0 12px rgba(66,165,245,.85); }
  @keyframes blink{ from{opacity:1;} to{opacity:.3;} }
  .fill.fatalFlash{
    background:#ff1744 !important;
    animation:fatalBlink .12s steps(2, end) infinite !important;
    box-shadow:0 0 14px #ff1744, 0 0 26px rgba(255,23,68,.85);
  }
  .stat.fatalStat{
    outline:2px solid rgba(255,23,68,.9);
    box-shadow:0 0 18px rgba(255,23,68,.75);
  }
  .fatalBeam{
    position:fixed; left:0; top:0; height:5px; width:0;
    transform-origin:left center; border-radius:999px;
    z-index:19; pointer-events:none;
    background:linear-gradient(90deg, rgba(255,23,68,1), rgba(255,210,210,.95), rgba(255,23,68,0));
    box-shadow:0 0 12px rgba(255,23,68,.95), 0 0 28px rgba(255,23,68,.7);
    animation:fatalBeamGrow 1.02s ease-out forwards;
  }
  .fatalBeamDot{
    position:fixed; width:22px; height:22px; border-radius:50%;
    z-index:19; pointer-events:none; opacity:0;
    background:rgba(255,23,68,.92);
    box-shadow:0 0 18px rgba(255,23,68,1), 0 0 42px rgba(255,23,68,.8);
    transform:translate(-50%, -50%) scale(.45);
    animation:fatalBeamDot 1.02s ease-out forwards;
  }
  .fatalBall{
    position:fixed; left:50%; top:50%; z-index:19;
    pointer-events:none; font-size:42px; line-height:1;
    opacity:0; transform:translate(-50%, -50%) scale(.55) rotate(0deg);
    filter:drop-shadow(0 0 12px rgba(255,255,255,.9)) drop-shadow(0 0 22px rgba(255,23,68,.95));
    animation:fatalBallExplode 1.38s ease-out forwards;
  }
  .fatalExplosionFlash{
    position:fixed; left:50%; top:50%; z-index:18;
    width:34px; height:34px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) scale(.2);
    background:radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,235,120,.95) 28%, rgba(255,54,54,.72) 58%, rgba(255,54,54,0) 72%);
    animation:fatalExplosionFlash 1.38s ease-out forwards;
  }
  .fatalExplosionRing{
    position:fixed; left:50%; top:50%; z-index:18;
    width:44px; height:44px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) scale(.15);
    border:3px solid rgba(255,236,120,.95);
    box-shadow:0 0 20px rgba(255,236,120,.9), inset 0 0 18px rgba(255,23,68,.8);
    animation:fatalExplosionRing 1.38s ease-out forwards;
  }
  .fatalSpark{
    position:fixed; left:50%; top:50%; z-index:19;
    width:6px; height:6px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) rotate(var(--spark-angle)) translateX(0) scale(.8);
    background:var(--spark-color);
    box-shadow:0 0 10px var(--spark-color);
    animation:fatalSpark 1.38s ease-out forwards;
  }
  .promotionBeam{
    position:fixed; left:0; top:0; height:5px; width:0;
    transform-origin:left center; border-radius:999px;
    z-index:19; pointer-events:none;
    background:linear-gradient(90deg, rgba(66,165,245,1), rgba(210,238,255,.98), rgba(66,165,245,0));
    box-shadow:0 0 12px rgba(66,165,245,.95), 0 0 30px rgba(66,165,245,.78);
    animation:fatalBeamGrow 1.02s ease-out forwards;
  }
  .promotionBeamDot{
    position:fixed; width:24px; height:24px; border-radius:50%;
    z-index:19; pointer-events:none; opacity:0;
    background:rgba(66,165,245,.96);
    box-shadow:0 0 20px rgba(66,165,245,1), 0 0 46px rgba(66,165,245,.85);
    transform:translate(-50%, -50%) scale(.45);
    animation:fatalBeamDot 1.02s ease-out forwards;
  }
  .promotionBall{
    position:fixed; left:50%; top:50%; z-index:19;
    pointer-events:none; font-size:42px; line-height:1;
    opacity:0; transform:translate(-50%, -50%) scale(.55) rotate(0deg);
    filter:drop-shadow(0 0 12px rgba(255,255,255,.95)) drop-shadow(0 0 24px rgba(66,165,245,.95));
    animation:fatalBallExplode 1.38s ease-out forwards;
  }
  .promotionExplosionFlash{
    position:fixed; left:50%; top:50%; z-index:18;
    width:34px; height:34px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) scale(.2);
    background:radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,235,120,.95) 26%, rgba(66,165,245,.78) 58%, rgba(66,165,245,0) 74%);
    animation:fatalExplosionFlash 1.38s ease-out forwards;
  }
  .promotionExplosionRing{
    position:fixed; left:50%; top:50%; z-index:18;
    width:44px; height:44px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) scale(.15);
    border:3px solid rgba(210,238,255,.96);
    box-shadow:0 0 22px rgba(66,165,245,.96), inset 0 0 18px rgba(255,235,120,.85);
    animation:fatalExplosionRing 1.38s ease-out forwards;
  }
  .promotionSpark{
    position:fixed; left:50%; top:50%; z-index:19;
    width:6px; height:6px; border-radius:50%; pointer-events:none;
    opacity:0; transform:translate(-50%, -50%) rotate(var(--spark-angle)) translateX(0) scale(.8);
    background:var(--spark-color);
    box-shadow:0 0 10px var(--spark-color);
    animation:fatalSpark 1.38s ease-out forwards;
  }
  @keyframes fatalBallExplode{
    0%, 43%{ opacity:0; transform:translate(-50%, -50%) scale(.55) rotate(0deg); }
    50%{ opacity:1; transform:translate(calc(-50% - 3px), calc(-50% + 2px)) scale(.82) rotate(-8deg); }
    56%{ opacity:1; transform:translate(calc(-50% + 4px), calc(-50% - 2px)) scale(.9) rotate(9deg); }
    62%{ opacity:1; transform:translate(calc(-50% - 4px), calc(-50% - 1px)) scale(1.02) rotate(-11deg); }
    69%{ opacity:1; transform:translate(calc(-50% + 3px), calc(-50% + 3px)) scale(1.2) rotate(12deg); }
    76%{ opacity:1; transform:translate(-50%, -50%) scale(1.55) rotate(0deg); }
    82%{ opacity:0; transform:translate(-50%, -50%) scale(2.25) rotate(18deg); }
    100%{ opacity:0; transform:translate(-50%, -50%) scale(2.6) rotate(18deg); }
  }
  @keyframes fatalExplosionFlash{
    0%, 70%{ opacity:0; transform:translate(-50%, -50%) scale(.2); }
    78%{ opacity:1; transform:translate(-50%, -50%) scale(3.2); }
    100%{ opacity:0; transform:translate(-50%, -50%) scale(7.2); }
  }
  @keyframes fatalExplosionRing{
    0%, 72%{ opacity:0; transform:translate(-50%, -50%) scale(.15); }
    80%{ opacity:1; transform:translate(-50%, -50%) scale(1.45); }
    100%{ opacity:0; transform:translate(-50%, -50%) scale(5.4); }
  }
  @keyframes fatalSpark{
    0%, 73%{ opacity:0; transform:translate(-50%, -50%) rotate(var(--spark-angle)) translateX(0) scale(.8); }
    80%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%, -50%) rotate(var(--spark-angle)) translateX(var(--spark-distance)) scale(.2); }
  }
  @keyframes fatalBeamGrow{
    0%{ width:0; opacity:0; }
    12%{ opacity:1; }
    78%{ opacity:1; }
    100%{ width:var(--beam-length); opacity:0; }
  }
  @keyframes fatalBeamDot{
    0%, 54%{ opacity:0; transform:translate(-50%, -50%) scale(.45); }
    70%{ opacity:1; transform:translate(-50%, -50%) scale(1.25); }
    100%{ opacity:0; transform:translate(-50%, -50%) scale(1.9); }
  }
  @keyframes fatalBlink{
    0%{ opacity:1; filter:brightness(1.9); }
    50%{ opacity:.15; filter:brightness(.7); }
    100%{ opacity:1; filter:brightness(1.9); }
  }
  #squadBar{ background:#42a5f5; }
  .cardWrap{ position:relative; height:330px; }
  .cardWrap::before, .cardWrap::after{
    content:""; position:absolute; inset:0; background:#e9efe9; border-radius:16px; z-index:0;
  }
  .cardWrap::before{ transform: translateY(14px) scale(.94); opacity:.4; }
  .cardWrap::after{ transform: translateY(7px) scale(.97); opacity:.7; }
  .card{
    position:absolute; inset:0; z-index:1; background:#fff; color:#222;
    border-radius:16px; padding:26px; cursor:grab; user-select:none; touch-action:none;
    box-shadow: 0 12px 30px rgba(0,0,0,.5); display:flex; flex-direction:column;
  }
  .card:active{ cursor:grabbing; }
  .portrait{ font-size:46px; text-align:center; margin-bottom:8px; min-height:46px; }
  .portrait img{ width:120px; height:120px; border-radius:12px; object-fit:cover; box-shadow:0 6px 14px rgba(0,0,0,.35); display:inline-block; image-rendering:auto; background:#efe7c7; }
  .speaker{ text-align:center; font-size:12px; color:#888; margin-bottom:10px; }
  .card h2{ margin:0 0 12px; font-size:19px; text-align:center; }
  .card p{ margin:0; line-height:1.6; font-size:15px; color:#444; white-space:pre-line; }
  .choice{
    position:absolute; top:16px; font-size:20px; font-weight:bold;
    padding:4px 12px; border-radius:8px; opacity:0; pointer-events:none;
  }
  .leftChoice{ left:14px; color:#e53935; border:2px solid #e53935; transform:rotate(-12deg); }
  .rightChoice{ right:14px; color:#43a047; border:2px solid #43a047; transform:rotate(12deg); }
  .choiceIcons{
    position:absolute; top:62px; display:flex; gap:6px;
    opacity:0; pointer-events:none; transition: opacity .08s linear;
  }
  .leftIcons{ left:18px; transform:rotate(-12deg); }
  .rightIcons{ right:18px; transform:rotate(12deg); }
  .statValue{ display:none; margin-left:4px; color:#ffd54f; font-weight:800; font-size:12px; }
  .choiceIcons .si{
    background:rgba(0,0,0,.72); color:#fff; border-radius:8px;
    padding:4px 7px; font-size:11px; line-height:1.15; font-weight:800; white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.28);
  }
  .choiceIcons .si.plus{ color:#62e88f; }
  .choiceIcons .si.minus{ color:#ff7373; }
  .itemModal{
    position:fixed; inset:0; z-index:30;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.72);
    padding:22px;
    opacity:0;
    transition:opacity .22s ease;
  }
  .itemModal.show{ display:flex; opacity:1; }
  .itemModalCard{
    width:300px; max-width:86vw; min-height:390px;
    border-radius:22px;
    padding:22px 20px 18px;
    text-align:center;
    background:
      radial-gradient(circle at 50% 14%, rgba(255,213,79,.24), transparent 34%),
      linear-gradient(180deg, #1b2b22 0%, #0e1712 100%);
    border:1px solid rgba(255,213,79,.56);
    box-shadow:0 22px 60px rgba(0,0,0,.62), 0 0 26px rgba(255,213,79,.18), inset 0 1px 0 rgba(255,255,255,.14);
    transform:translateY(10px) scale(.96);
    animation:itemCardIn .26s ease-out forwards;
  }
  @keyframes itemCardIn{
    to{ transform:translateY(0) scale(1); }
  }
  .itemModalKicker{
    display:inline-block;
    padding:5px 12px;
    border-radius:999px;
    color:#14351f;
    background:#ffd54f;
    font-size:11px;
    font-weight:900;
    letter-spacing:.12em;
    margin-bottom:18px;
  }
  .itemModalIcon{ font-size:52px; margin:2px 0 10px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.38)); }
  .itemModalCard h2{ margin:0; font-size:34px; color:#fff; letter-spacing:.04em; }
  .itemModalCard p{ margin:18px auto 22px; max-width:238px; color:#ffe2c2; font-size:14px; line-height:1.75; }
  .itemModalQuestion{ color:#ffd54f; font-weight:900; font-size:15px; margin-bottom:14px; }
  .itemModalActions{ display:flex; gap:10px; }
  .itemModalActions button{
    flex:1; border:0; border-radius:12px; padding:12px 8px;
    font-size:13px; font-weight:900; cursor:pointer;
  }
  #itemCancelButton{ color:#dce8df; background:rgba(255,255,255,.12); }
  #itemUseButton{ color:#14351f; background:#ffd54f; box-shadow:0 5px 12px rgba(255,213,79,.22); }
  #message{ text-align:center; margin-top:14px; color:#ffe2c2; font-size:13px; min-height:18px; }
  #banner{
    position:fixed; inset:0; background:rgba(7,22,13,.92);
    display:none; flex-direction:column; justify-content:center; align-items:center;
    z-index:10; text-align:center; padding:20px;
  }
  #banner h1{ font-size:34px; margin:0 0 12px; color:#ffd54f; }
  #banner p{ font-size:15px; color:#ffe2c2; max-width:320px; line-height:1.7; }
  #banner small{ margin-top:18px; color:#9fb8a6; }
  .confettiPiece{
    position:fixed; top:-18px; width:8px; height:14px;
    z-index:18; pointer-events:none; opacity:.95;
    background:var(--confetti-color);
    left:var(--confetti-left);
    transform:rotate(var(--confetti-rotate));
    animation:confettiFall var(--confetti-duration) ease-in forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translate3d(0,-20px,0) rotate(var(--confetti-rotate)); opacity:0; }
    8%{ opacity:1; }
    100%{ transform:translate3d(var(--confetti-drift),110vh,0) rotate(calc(var(--confetti-rotate) + 720deg)); opacity:0; }
  }
  #gameover{
    position:fixed; inset:0; background:#000;
    display:none; flex-direction:column; justify-content:center; align-items:center;
    z-index:20; text-align:center; padding:24px;
  }
  #gameover h1{ font-size:56px; letter-spacing:8px; margin:0 0 18px; color:#e53935; font-weight:900; }
  #gameover #goReason{ font-size:16px; color:#eee; max-width:320px; line-height:1.8; margin:0; }
  #gameover #goDay{ font-size:30px; color:#ff1744; margin-top:18px; font-weight:900; letter-spacing:1px; text-shadow:0 0 18px rgba(255,23,68,.55); }
  #gameover small{ margin-top:26px; color:#777; }


/* ===== タイトル画面 ===== */
#titleScreen{
  position:fixed; inset:0; z-index:60;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 12%, #ffb65a, #c85a18 55%, #3a1606 100%);
  color:#fff; overflow:hidden;
}
#titleScreen::before{
  content:""; position:absolute; inset:-20%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.25), transparent 24%),
    radial-gradient(circle at 80% 10%, rgba(255,210,120,.22), transparent 26%),
    repeating-linear-gradient(135deg, rgba(255,255,255,.055) 0 2px, transparent 2px 8px);
  animation:titleBgDrift 14s linear infinite;
}
@keyframes titleBgDrift{
  from{ transform:translate3d(0,0,0) rotate(0deg); }
  to{ transform:translate3d(-28px,18px,0) rotate(1deg); }
}
.titlePanel{
  position:relative; width:min(390px, 94vw); min-height:690px; max-height:96vh;
  border-radius:26px; overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(0,0,0,.34));
  box-shadow:0 28px 70px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.28);
  transform:translateY(0); animation:titlePanelIn .7s cubic-bezier(.2,.9,.2,1) both;
}
@keyframes titlePanelIn{
  from{ opacity:0; transform:translateY(18px) scale(.96); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}
.titleImage{
  position:absolute; left:50%; top:28px; width:112%; max-width:none;
  transform:translateX(-50%);
  filter:contrast(1.08) drop-shadow(0 14px 24px rgba(0,0,0,.45));
  opacity:.92;
}
.titleGradient{
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(35,12,0,.02) 0%, rgba(35,12,0,.12) 45%, rgba(35,12,0,.88) 74%, rgba(20,6,0,.96) 100%);
}
.titleLogo{
  position:absolute; left:18px; right:18px; bottom:168px; text-align:center;
  padding:18px 10px 12px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,127,24,.88), rgba(177,55,8,.92));
  border:2px solid rgba(255,236,170,.9);
  box-shadow:0 12px 28px rgba(0,0,0,.4), inset 0 0 20px rgba(255,255,255,.16);
}
.titleMain{
  margin:0; font-weight:1000; letter-spacing:.04em; line-height:.95;
  font-size:54px; color:#fff7d7;
  text-shadow:4px 4px 0 #321000, -2px -2px 0 rgba(255,255,255,.18), 0 0 18px rgba(255,210,80,.45);
}
.titleSub{
  margin:8px 0 0; font-size:15px; font-weight:900; letter-spacing:.08em; color:#fff;
  text-shadow:0 2px 4px rgba(0,0,0,.55);
}
.titleCatch{
  position:absolute; left:24px; right:24px; bottom:112px;
  text-align:center; font-size:13px; line-height:1.55; color:#ffe8bd;
  text-shadow:0 2px 4px rgba(0,0,0,.7);
}
#titleStartButton{
  position:absolute; left:50%; bottom:42px; transform:translateX(-50%);
  width:210px; height:54px; border:0; border-radius:999px;
  color:#351200; font-size:19px; font-weight:1000; letter-spacing:.12em;
  background:linear-gradient(180deg, #fff1a8, #ffae2e 55%, #e56a13);
  box-shadow:0 10px 24px rgba(0,0,0,.42), inset 0 2px 0 rgba(255,255,255,.75), 0 0 22px rgba(255,183,44,.58);
  cursor:pointer;
  animation:startPulse 1.2s ease-in-out infinite alternate;
}
@keyframes startPulse{
  from{ filter:brightness(1); transform:translateX(-50%) scale(1); }
  to{ filter:brightness(1.12); transform:translateX(-50%) scale(1.035); }
}
#titleStartButton:active{ transform:translateX(-50%) scale(.96); }
#titleScreen.hide{
  pointer-events:none;
  animation:titleFadeOut .5s ease forwards;
}
@keyframes titleFadeOut{ to{ opacity:0; transform:scale(1.04); } }
#game{
  opacity:0; transform:translateY(12px);
  transition:opacity .42s ease, transform .42s ease;
}
#game.gameStarted{ opacity:1; transform:translateY(0); }

</style>
</head>

  const modal = document.getElementById("itemModal");

    el.textContent = stats[key] + "/100";

  if(awakeningTurns > 0 && delta < 0) return Math.ceil(delta / 2);

}

  if(awakeningTurns > 0){

    updateItemUI();
  }

function weakestStatKey(){
  return ["front", "fans", "unity", "squad"].sort((a,b) => stats[a] - stats[b])[0];

function clamp(v){ return Math.max(0, Math.min(100, v)); }

function updateBars(){
  updateStatValues();
  for(const key in bars){
    const v = stats[key];
    bars[key].style.width = v + "%";
    const lowDanger = v <= 22;
    const highDanger = v >= 78;
    let color;
    if(lowDanger){
      color = "#e53935";
    } else if(highDanger && key === "squad"){
      color = "#42a5f5";
    } else if(highDanger){
      color = "#e53935";
    } else if(key === "squad"){
      color = "#42a5f5";
    } else {
      color = "#4caf50";
    }
    bars[key].style.background = color;
    bars[key].classList.toggle("danger", false);
    bars[key].classList.toggle("dangerLow", lowDanger);
    bars[key].classList.toggle("dangerHigh", highDanger);
  }
}

function showStatDelta(key, delta){
  if(!delta || !bars[key]) return;
  const statEl = bars[key].closest(".stat");
  if(!statEl) return;
  const pop = document.createElement("span");
  const isBig = Math.abs(delta) >= 20;
  pop.className = "deltaPop " + (delta > 0 ? "plus" : "minus") + (isBig ? " big" : "");
  pop.textContent = isBig ? (labels[key] + " " + (delta > 0 ? "+" : "") + delta) : ((delta > 0 ? "+" : "") + delta);
  statEl.appendChild(pop);
  setTimeout(() => pop.remove(), isBig ? 1120 : 950);
}

function showStatDeltas(deltas){
  for(const d of deltas) showStatDelta(d.key, d.delta);
}

function renderTopbar(){
  document.getElementById("leagueName").textContent = leagues[leagueIndex];
  document.getElementById("day").textContent = day;
}

function meetsCondition(card){
  if(card.playoffOnly && !isPlayoffLeague()) return false;
  if(card.minLeague != null && leagueIndex < card.minLeague) return false;
  if(card.maxLeague != null && leagueIndex > card.maxLeague) return false;
  if(!card.cond) return true;
  for(const key in card.cond){
    const c = card.cond[key];
    if(c.min != null && stats[key] < c.min) return false;
    if(c.max != null && stats[key] > c.max) return false;
  }
  return true;
}

let currentCard = null;
function pickRandomCard(){
  let pool = cards.filter(c => c.pool !== false && !used.has(c.id) && meetsCondition(c));
  if(pool.length === 0){
    for(const c of cards){ if(c.pool !== false) used.delete(c.id); }
    pool = cards.filter(c => c.pool !== false && meetsCondition(c));
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

function renderCard(card){
  const pEl = document.getElementById("portrait");
  const pic = card.arc && portraitImg[card.arc];
  if(pic){ pEl.innerHTML = '<img src="' + pic + '" alt="">'; }
  else { pEl.textContent = card.portrait || ""; }
  document.getElementById("speaker").textContent = card.speaker || "";
  document.getElementById("title").textContent = card.title || "";
  let body = card.text || "";
  if(card.id === "matchday" && currentMatchOpp){
    body = "相手は「" + currentMatchOpp.name + "」チーム。今日のゲームプランは？";
  }
  document.getElementById("text").textContent = body;
  document.getElementById("leftLabel").textContent = card.left || "";
  document.getElementById("rightLabel").textContent = card.right || "";
  setChoiceHints(card);
  const el = document.getElementById("card");
  el.style.background = card.bg || "#fff";
  el.style.transition = "none";
  el.style.transform = "none";
  document.getElementById("leftLabel").style.opacity = 0;
  document.getElementById("rightLabel").style.opacity = 0;
  hideChoiceHints();
}

// ===== 選択肢の予告表示 =====
// スワイプ中、動くステータスバーの横に半透明の「+/-数値」を出す。
let choiceHints = { left: [], right: [] };
function setChoiceHints(card){
  hideChoiceHints();
  choiceHints = { left: [], right: [] };
  document.getElementById("leftIcons").innerHTML = "";
  document.getElementById("rightIcons").innerHTML = "";
  if(!card || !card.effects) return;
  // プロローグ・試合当日など、その時点で確定しない選択では予告を出さない
  if(card.intro) return;
  if(card.id === "matchday") return;
  for(const side of ["left", "right"]){
    const eff = card.effects[side] || {};
    const hints = [];
    for(const key of ["squad", "front", "fans", "unity"]){
      if(!(key in eff)) continue;
      const rawDelta = adjustStatDelta(Math.round(eff[key] * EFFECT_MULTIPLIER));
      const actualDelta = clamp(stats[key] + rawDelta) - stats[key];
      if(!actualDelta) continue;
      hints.push({ key, delta: actualDelta });
    }
    choiceHints[side] = hints;
    const iconEl = document.getElementById(side + "Icons");
    if(iconEl){
      iconEl.innerHTML = hints.map(h => '<span class="si ' + (h.delta > 0 ? 'plus' : 'minus') + '">' + labels[h.key] + ' ' + (h.delta > 0 ? '+' : '') + h.delta + '</span>').join('');
    }
  }
}
function hintStatElement(key){
  if(!bars[key]) return null;
  return bars[key].closest(".stat");
}
function hideChoiceHints(){
  document.getElementById("leftIcons").style.opacity = 0;
  document.getElementById("rightIcons").style.opacity = 0;
  document.querySelectorAll(".stat.choiceHintUp,.stat.choiceHintDown").forEach(el => {
    el.classList.remove("choiceHintUp", "choiceHintDown");
    el.style.removeProperty("--hint-opacity");
  });
}
function showChoiceHints(side, opacity){
  hideChoiceHints();
  if(awakeningTurns > 0 && side){
    const iconEl = document.getElementById(side + "Icons");
    if(iconEl) iconEl.style.opacity = opacity;
  }
  if(!side || !choiceHints[side] || opacity <= 0) return;
  for(const hint of choiceHints[side]){
    const statEl = hintStatElement(hint.key);
    if(!statEl) continue;
    statEl.classList.add(hint.delta > 0 ? "choiceHintUp" : "choiceHintDown");
    statEl.style.setProperty("--hint-opacity", opacity.toFixed(2));
  }
}

function nextCard(){
  let card;
  if(forcedNextId){
    card = cards.find(c => c.id === forcedNextId);
    forcedNextId = null;
    if(card && !meetsCondition(card)) card = null;
  }
  if(!card) card = pickRandomCard();
  currentCard = card;
  if(card.pool !== false) used.add(card.id);
  if(card.once) used.add(card.id);
  renderCard(card);
}

function gameOverIntro(causeKey){
  if(!causeKey) return "";
  const v = stats[causeKey];
  const isLow = v <= SAFE_LOW;
  const intros = {
    front: {
      low: "フロントの信用が尽きた。",
      high: "フロント評価が高まりすぎた。"
    },
    fans: {
      low: "ブースター支持が失われた。",
      high: "ブースター支持が過熱した。"
    },
    unity: {
      low: "ロッカーが崩壊した。",
      high: "ロッカーが馴れ合いに傾きすぎた。"
    },
    squad: {
      low: "チーム力が降格プレーオフ圏に沈んだ。",
      high: "チーム力が上位チームの注目を集めすぎた。"
    }
  };
  const item = intros[causeKey];
  if(!item) return "";
  return (isLow ? item.low : item.high) + " ";
}

function showFatalBeam(causeKey){
  if(!causeKey || !bars[causeKey]) return;
  const rect = bars[causeKey].getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;
  const endX = window.innerWidth / 2;
  const endY = window.innerHeight / 2;
  const dx = endX - startX;
  const dy = endY - startY;
  const length = Math.hypot(dx, dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  document.querySelectorAll(".fatalBeam,.fatalBeamDot").forEach(el => el.remove());

  const beam = document.createElement("div");
  beam.className = "fatalBeam";
  beam.style.left = startX + "px";

function gameOver(reasonText, causeKey){
  alive = false;
  hideChoiceHints();
  const finalReason = reasonText;
  if(causeKey && bars[causeKey]){
    const bar = bars[causeKey];
    const statEl = bar.closest(".stat");
    bar.classList.add("fatalFlash");
    if(statEl) statEl.classList.add("fatalStat");
    showFatalBeam(causeKey);
    showFatalBallExplosion();
    setTimeout(() => showGameOverScreen(finalReason), 1450);
  } else {
    showGameOverScreen(finalReason);
  }
}

  const endX = window.innerWidth / 2;
  const endY = window.innerHeight / 2;

  const dy = endY - startY;

  dot.className = "promotionBeamDot";
  dot.style.left = endX + "px";

}

function promote(){
  leagueIndex++;
  let title, body, withConfetti = false;
  if(leagueIndex >= leagues.length){
    leagueIndex = leagues.length - 1;
    title = "🏆 制覇！";
    body = "あなたはついにアメリカンリーグの頂点に立った。小さなバスケットボールチームを伝説へと導いた名ヘッドコーチとして、あなたの名は永遠に語り継がれる。";
  } else {
    if(leagueIndex === 1){
      day += 75;
      title = "残留！";
      body = "昇降格プレーオフをなんとか勝ち抜き「プロ3部リーグ」への残留に成功した。新シーズンから新たな戦いが始まる。";
    } else {
      day += 300;
      if(leagueIndex === 2){
        title = "⬆️ 昇格！";
        body = "勢いそのままチームは「プロ2部リーグ」へ昇格を決めた。1年後、新たな舞台にあなたは足を踏み入れる。";
      } else if(leagueIndex === 3){
        title = "⬆️ 昇格！";
        body = "破竹の勢いは止まらず、チームはついに「プロ1部リーグ」へ昇格した。1年後、国内の頂点を目指す戦いが始まる。";
      } else if(leagueIndex === 4){
        title = "⬆️ 優勝！";
        body = "国内リーグを優勝し、チームは「アメリカンリーグ」への挑戦権を得た。いよいよ戦いはアメリカンリーグの舞台へ";
      } else {
        title = "⬆️ 昇格！";
        body = "「" + leagues[leagueIndex] + "」へ進出した。新たなアリーナと強敵の中で、またゼロからの挑戦が始まる。";
      }
    }
    withConfetti = true;
  }
  const showPromotionBanner = () => showBanner(title, body);
  if(withConfetti) showPromotionCelebration(showPromotionBanner);
  else showPromotionBanner();
  for(const k in stats) stats[k] = 50;
  used.clear();
  forcedNextId = null;
  matchCountdown = MATCH_INTERVAL;

  seedArcs();
  updateBars();
  renderTopbar();

}

// アークの分岐：選択とbond/flagに応じて次のビートを返す
function arcBranch(id, side){
  switch(id){
    case "playoff_yuki_gamble":
      if(side === "right") return { id:"playoff_yuki_start", gap:rg(4,6) };
      return null;
    case "playoff_yuki_start":
      return { id:"playoff_yuki_div1_offer", gap:rg(4,6) };
    case "playoff_yuki_div1_offer":
      if(side === "left") return { id: bond.yuki >= 60 ? "playoff_yuki_symbol" : "playoff_yuki_uncertain", gap:rg(2,3) };
      return { id:"playoff_yuki_departure", gap:rg(2,3) };
    case "playoff_yuki_symbol": flags.yukiSymbol = true; return null;
    case "playoff_novak_taunt":
      return { id:"playoff_novak_probe", gap:rg(5,7) };
    case "playoff_novak_probe":
      return { id:"playoff_novak_derby", gap:rg(5,7) };
    case "yuki_1":
      if(side === "right") return { id:"yuki_2", gap:rg(4,6) };
      return null;
    case "yuki_2":
      return { id:"yuki_3", gap:rg(4,6) };
    case "yuki_3":
      if(side === "left") return { id: bond.yuki >= 60 ? "yuki_stay_good" : "yuki_stay_bad", gap:rg(2,3) };
      return { id:"yuki_sold", gap:rg(2,3) };
    case "yuki_stay_good": flags.yukiSymbol = true; return null;
    case "daimon_1":
      if(side === "left") return { id:"daimon_cold", gap:rg(2,3) };
      return { id:"daimon_2", gap:rg(4,6) };
    case "daimon_2":
      return { id:"daimon_3", gap:rg(3,5) };
    case "daimon_3":
      return { id: bond.daimon >= 65 ? "daimon_coach" : "daimon_quiet", gap:rg(2,3) };
    case "daimon_coach": flags.daimonCoach = true; return null;
    case "leo_1":
      return { id:"leo_2", gap:rg(4,6) };
    case "leo_2":
      return { id:"leo_3", gap:rg(4,6) };
    case "leo_3":
      if(side === "left") return { id: bond.leo >= 55 ? "leo_legend" : "leo_forced_stay", gap:rg(2,3) };
      return { id:"leo_sold", gap:rg(2,3) };
    case "leo_legend": flags.leoLegend = true; return null;
    case "novak_1":
      return { id:"novak_2", gap:rg(5,7) };
    case "novak_2":
      return { id:"novak_3", gap:rg(5,7) };
  }
  return null;
}

function applyEffects(side){
  if(!alive) return;
  const card = currentCard;

  // プロローグ：通常カードと同じスワイプ操作で読み進めるが、日数・ステータスは変化しない
  if(card.intro){
    if(card.nextIntro){
      forcedNextId = card.nextIntro;
    } else {
      seedArcs();
      forcedNextId = "inaugural";
    }
    nextCard();
    return;
  }

  // 試合当日：選択に関わらず勝敗を判定し、会見カードへ
  // 勝てばチーム力が上がり、負ければチーム力が下がる。
  if(card.id === "matchday"){
    day++;
    const teamMood = (stats.unity - 50) * 0.006 + (stats.fans - 50) * 0.004 + (stats.squad - 50) * 0.002;
    const winRate = clamp((currentMatchOpp.rate + teamMood) * 100) / 100;
    const win = bribeWinReady ? true : Math.random() < winRate;
    const usedBribeWin = bribeWinReady;
    bribeWinReady = false;
    if(win){
      const before = stats.squad;
      stats.squad = clamp(stats.squad + MATCH_WIN_RANK_GAIN);
      const actualDelta = stats.squad - before;
      updateBars();
      showStatDelta("squad", actualDelta);
      renderTopbar();
      if(stats.squad >= PROMOTION_SQUAD) return promote();
      forcedNextId = "victory_pc";
      showBanner("✅ 勝利！", (usedBribeWin ? "賄賂が効いた。" : "") + "「" + currentMatchOpp.name + "」チームとの一戦に勝利。チーム力が上がった！");
    } else {
      const before = stats.squad;
      stats.squad = clamp(stats.squad + adjustStatDelta(-MATCH_LOSS_RANK_DROP));
      const actualDelta = stats.squad - before;
      updateBars();
      showStatDelta("squad", actualDelta);
      renderTopbar();
      if(stats.squad <= SAFE_LOW) return gameOver("試合に敗れ、チームの降格は決定的となった。チームはあなたとの契約を打ち切り、新たなヘッドコーチを招致した。", "squad");
      forcedNextId = "defeat_pc";
      showBanner("❌ 敗北", "「" + currentMatchOpp.name + "」チームとの一戦に敗れた。チーム力が下がった…");
    }
    consumeItemTurn();
    updateItemUI();
    nextCard();
    return;
  }

  day++;

  // 効果を適用（bondはカードのarcの人物への信頼度）
  const eff = (card.effects && card.effects[side]) || {};
  const statDeltas = [];
  for(const key in eff){
    if(key === "bond"){
      if(card.arc) bond[card.arc] = clamp(bond[card.arc] + eff.bond);
      continue;
    }
    if(key in stats){
      const before = stats[key];
      const delta = adjustStatDelta(Math.round(eff[key] * EFFECT_MULTIPLIER));
      stats[key] = clamp(stats[key] + delta);
      const actualDelta = stats[key] - before;
      if(actualDelta) statDeltas.push({ key, delta: actualDelta });
    }
  }

  // 会見カードの後は次の試合までのカウントをリセット
  if(card.id === "victory_pc" || card.id === "defeat_pc"){
    matchCountdown = MATCH_INTERVAL;
  }
  // 勝利会見：個別アークを踏まえたレジェンドがチームに指針を与える
  if(card.id === "victory_pc"){
    if(flags.daimonCoach){ const before = stats.unity; stats.unity = clamp(stats.unity + 2); if(stats.unity - before) statDeltas.push({ key:"unity", delta:stats.unity - before }); }
    if(flags.yukiSymbol){  const before = stats.fans;  stats.fans  = clamp(stats.fans  + 2); if(stats.fans  - before) statDeltas.push({ key:"fans",  delta:stats.fans  - before }); }
    if(flags.leoLegend){   const before = stats.squad; stats.squad = clamp(stats.squad + 2); if(stats.squad - before) statDeltas.push({ key:"squad", delta:stats.squad - before }); }
  }

  updateBars();
  showStatDeltas(statDeltas);
  renderTopbar();

  // ゲームオーバー判定
  for(const key of ["front", "fans", "unity"]){
    if(stats[key] <= SAFE_LOW) return gameOver(deathMessages[key].low, key);
    if(stats[key] >= SAFE_HIGH) return gameOver(deathMessages[key].high, key);
  }
  if(stats.squad <= SAFE_LOW) return gameOver("リーグ降格が決まってしまった。チームはあなたとの契約を打ち切った。", "squad");
  if(stats.squad >= PROMOTION_SQUAD) return promote();

  // カード固有のチェーン
  let chainId = null;
  if(side === "left" && card.nextLeft) chainId = card.nextLeft;
  if(side === "right" && card.nextRight) chainId = card.nextRight;

  // アークの分岐をスケジュール（間隔を空けて再登場）
  if(card.arc){
    const branch = arcBranch(card.id, side);
    if(branch) schedule(branch.id, branch.gap);
  }

  consumeItemTurn();
  updateItemUI();

  if(chainId){
    forcedNextId = chainId;
  } else if(!forcedNextId){
    matchCountdown--;
    if(matchCountdown <= 0){
      setupMatch();
      forcedNextId = "matchday";
      matchCountdown = MATCH_INTERVAL;
    } else {
      for(let i = 0; i < scheduled.length; i++) scheduled[i].countdown--;
      const idx = scheduled.findIndex(s => s.countdown <= 0);
      if(idx >= 0){
        forcedNextId = scheduled[idx].id;
        scheduled.splice(idx, 1);
      }
    }
  }

  nextCard();
}

// ===== スワイプ操作 =====
let startX = 0, currentX = 0, dragging = false;
const cardEl = document.getElementById("card");
cardEl.addEventListener("pointerdown", e => {
  if(!alive) return;
  dragging = true; startX = e.clientX; currentX = 0;
  cardEl.setPointerCapture(e.pointerId);
  cardEl.style.transition = "none";
});
cardEl.addEventListener("pointermove", e => {
  if(!dragging) return;
  currentX = e.clientX - startX;
  cardEl.style.transform = "translateX(" + currentX + "px) rotate(" + (currentX / 20) + "deg)";
  const rightOp = currentX > 0 ? Math.min(1, currentX / 120) : 0;
  const leftOp  = currentX < 0 ? Math.min(1, -currentX / 120) : 0;
  document.getElementById("rightLabel").style.opacity = rightOp;
  document.getElementById("leftLabel").style.opacity  = leftOp;
  // 予告色は少し早めに(20pxから)薄く出始める。上がるカテゴリは緑、下がるカテゴリは赤で示す。
  const rightHintOp = currentX > 0 ? Math.min(.28, Math.max(0, (currentX - 20) / 95) * .28) : 0;
  const leftHintOp  = currentX < 0 ? Math.min(.28, Math.max(0, (-currentX - 20) / 95) * .28) : 0;
  if(rightHintOp > 0) showChoiceHints("right", rightHintOp);
  else if(leftHintOp > 0) showChoiceHints("left", leftHintOp);
  else hideChoiceHints();
});
function endDrag(){
  if(!dragging) return;
  dragging = false;
  const threshold = 110;
  if(currentX > threshold) flyOut(1, "right");
  else if(currentX < -threshold) flyOut(-1, "left");
  else {
    cardEl.style.transition = "transform .25s ease";
    cardEl.style.transform = "none";
    document.getElementById("leftLabel").style.opacity = 0;
    document.getElementById("rightLabel").style.opacity = 0;
    hideChoiceHints();
  }
}
cardEl.addEventListener("pointerup", endDrag);
cardEl.addEventListener("pointercancel", endDrag);
function flyOut(dir, side){
  hideChoiceHints();
  cardEl.style.transition = "transform .35s ease";
  cardEl.style.transform = "translateX(" + (dir * 600) + "px) rotate(" + (dir * 30) + "deg)";
  setTimeout(() => applyEffects(side), 230);
}
